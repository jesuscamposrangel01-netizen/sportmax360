<!DOCTYPE html>
<html lang="es‑PE">
<head>
  <meta charset="UTF‑8">
  <meta name="viewport" content="width=device‑width, initial‑scale=1.0">
  <title>SportVivo360 — MLB en vivo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font‑awesome@6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            azul: '#165DFF',
            rojoVivo: '#E53935',
            gris: '#6B7280',
            grisClaro: '#E5E7EB',
          },
          fontFamily: {
            sans: ['Inter', 'system‑ui', 'sans‑serif'],
          },
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto { content‑visibility: auto; }
      .grid‑entradas { display: grid; grid‑template‑columns: repeat(12, 1fr); gap: 0.25rem; min‑width: 280px; }
      .diamante‑base { width: 0.65rem; height: 0.65rem; transform: rotate(45deg); border: 1px solid #9ca3af; }
      .diamante‑base.vacia { background: transparent; }
      .diamante‑base.ocupada { background: #ef4444; border‑color: #ef4444; }
      .plato { width: 0.5rem; height: 0.5rem; background: #6b7280; transform: none; border‑radius: 50%; }
      .parpadeo { animation: parpadeo 1s infinite; }
      .spinner { width: 2rem; height: 2rem; border: 3px solid #e5e7eb; border‑top‑color: #3b82f6; border‑radius: 50%; animation: girar 0.8s linear infinite; }
      .card‑hover { transition: transform .2s, box‑shadow .2s; }
      .card‑hover:hover { transform: translateY(‑2px); box‑shadow: 0 10px 15px ‑3px rgba(0,0,0,0.08); }
    }
    @keyframes parpadeo { 0%,100% {opacity:1;} 50% {opacity:0.4;} }
    @keyframes girar { to {transform: rotate(360deg);} }
  </style>
</head>
<body class="bg‑gray‑50 dark:bg‑gray‑900 text‑gray‑800 dark:text‑gray‑100 min‑h‑screen font‑sans">

  <!-- Navegación -->
  <header class="sticky top‑0 z‑50 bg‑white/80 dark:bg‑gray‑800/80 backdrop‑blur border‑b border‑grisClaro dark:border‑gray‑700">
    <div class="container mx‑auto px‑4 py‑3 flex items‑center justify‑between">
      <a href="#" class="text‑xl font‑bold text‑azul">SportVivo360</a>
      <div class="flex items‑center gap‑4">
        <label class="relative inline‑flex items‑cursor‑pointer">
          <input type="checkbox" id="themeCheckbox" class="sr‑only peer">
          <span class="w‑9 h‑5 bg‑gray‑200 peer‑checked:bg‑azul rounded‑full block transition‑col"></span>
          <span class="absolute left‑1 top‑1/2 ‑translate‑y‑1/2 w‑3.5 h‑3.5 bg‑white rounded‑full transition‑transform peer‑checked:translate‑x‑4"></span>
        </label>
      </div>
    </div>
  </header>

  <!-- Contenido principal -->
  <main class="container mx‑auto px‑4 py‑6">
    <!-- Pestañas -->
    <div class="flex gap‑3 border‑b border‑grisClaro dark:border‑gray‑700 mb‑6">
      <button class="tab‑button active pb‑2 px‑1 font‑medium text‑azul border‑b‑2 border‑azul" data‑tab="mlb">MLB</button>
      <button class="tab‑button pb‑2 px‑1 font‑medium text‑gray‑600 dark:text‑gray‑400 hover:text‑azul" data‑tab="nba">NBA</button>
    </div>

    <!-- MLB -->
    <section id="tab‑mlb" class="tab‑content active">
      <div id="selector‑fechas" class="flex gap‑2 mb‑6"></div>
      <div id="lista‑partidos" class="grid gap‑4 md:grid‑cols‑2 lg:grid‑cols‑3"></div>
    </section>

    <!-- NBA -->
    <section id="tab‑nba" class="tab‑content hidden">
      <div id="lista‑nba" class="grid gap‑4 md:grid‑cols‑2 lg:grid‑cols‑3"></div>
    </section>
  </main>

  <!-- Aviso Cookies -->
  <div id="cookieBanner" class="fixed bottom‑4 left‑4 right‑4 bg‑white dark:bg‑gray‑800 p‑4 rounded‑xl shadow‑lg border border‑grisClaro dark:border‑gray‑700 hidden z‑50">
    <p class="text‑sm mb‑3">Usamos cookies para mejorar tu experiencia en SportVivo360.</p>
    <button onclick="aceptarCookies()" class="bg‑azul text‑white px‑4 py‑2 rounded‑lg text‑sm">Aceptar</button>
  </div>

  <!-- Script completo integrado -->
  <script>
    // 📌 Zona horaria fija: Lima UTC‑5
    const ZONA_UTC = -5;

    function fechaLima() {
      const ahora = new Date();
      return new Date(ahora.getTime() + ZONA_UTC * 3600000);
    }
    function iso(d) {
      if (!(d instanceof Date) || isNaN(d.getTime())) return "";
      return d.toISOString().split('T')[0];
    }
    function fechaParaAPI(fechaUsuario) {
      const copia = new Date(fechaUsuario);
      copia.setHours(copia.getHours() - ZONA_UTC);
      return iso(copia);
    }
    let fechaActual = fechaLima();

    document.addEventListener('DOMContentLoaded', () => {
      // --- Pestañas ---
      document.querySelectorAll('.tab‑button').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab‑button').forEach(b => b.classList.remove('active', 'text‑azul', 'border‑b‑2', 'border‑azul'));
          document.querySelectorAll('.tab‑content').forEach(c => c.classList.add('hidden'));
          btn.classList.add('active', 'text‑azul', 'border‑b‑2', 'border‑azul');
          btn.classList.remove('text‑gray‑600', 'dark:text‑gray‑400');
          document.getElementById('tab‑' + btn.dataset.tab).classList.remove('hidden');
        });
      });

      // --- Tema ---
      const chk = document.getElementById('themeCheckbox');
      if(localStorage.getItem('tema')==='dark' || 
         (!localStorage.getItem('tema') && window.matchMedia('(prefers‑color‑scheme: dark)').matches)){
        document.documentElement.classList.add('dark');
        chk.checked=true;
      }
      chk.addEventListener('change',()=>{
        document.documentElement.classList.toggle('dark');
        localStorage.setItem('tema', document.documentElement.classList.contains('dark')?'dark':'light');
      });

      // --- Cookies ---
      window.aceptarCookies=()=>{
        document.getElementById('cookieBanner').classList.add('hidden');
        localStorage.setItem('cookiesAceptadas','si');
      };
      if(!localStorage.getItem('cookiesAceptadas')){
        document.getElementById('cookieBanner').classList.remove('hidden');
      }

      // --- Fechas ---
      function textoFecha(d){
        const dias=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
        const meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
        return `${dias[d.getDay()]} ${d.getDate()} ${meses[d.getMonth()]}`;
      }
      window.cambiarFecha=n=>{fechaActual.setDate(fechaActual.getDate()+n);mostrarFechas();cargarMLB(fechaParaAPI(fechaActual));};
      window.irFecha=s=>{fechaActual=new Date(s+'T00:00:00‑05:00');mostrarFechas();cargarMLB(fechaParaAPI(fechaActual));};
      function mostrarFechas(){
        const cont=document.getElementById('selector‑fechas');
        if(!cont) return;
        let h='';
        for(let i=-1;i<=1;i++){
          let f=new Date(fechaActual);f.setDate(f.getDate()+i);
          const act=iso(f)===iso(fechaActual);
          h+=`<span class="px‑3 py‑1.5 rounded‑lg cursor‑pointer ${act?'bg‑azul text‑white font‑semibold':'hover:bg‑gray‑100 dark:hover:bg‑gray‑700'}" onclick="irFecha('${iso(f)}')">${textoFecha(f)}</span>`;
        }
        cont.innerHTML=h;
      }

      // --- MLB helpers ---
      function leerEntradas(ls,visitante){
        const inn=ls?.innings||[];
        const fila=Array(9).fill('-');
        inn.forEach((x,i)=>fila[i]=visitante?x.away?.runs??'-':x.home?.runs??'-');
        const tot=ls?.teams?.[visitante?'away':'home']||{};
        return {fila,C:tot.runs??'-',H:tot.hits??'-',E:tot.errors??'-'};
      }
      function dibujarBases(off){
        const b1=!!off?.first,b2=!!off?.second,b3=!!off?.third;
        return `
        <div class="relative w‑16 h‑16 mx‑auto">
          <div class="diamante‑base absolute top‑0 left‑1/2 ‑translate‑x‑1/2 ${b2?'ocupada':'vacia'}"></div>
          <div class="diamante‑base absolute bottom‑1/2 right‑0 translate‑y‑1/2 ${b1?'ocupada':'vacia'}"></div>
          <div class="diamante‑base absolute bottom‑1/2 left‑0 translate‑y‑1/2 ${b3?'ocupada':'vacia'}"></div>
          <div class="diamante‑base absolute top‑1/2 left‑1/2 ‑translate‑x‑1/2 ‑translate‑y‑1/2 plato"></div>
        </div>`;
      }

      // --- MLB ---
      async function cargarMLB(fecha){
        const cont=document.getElementById('lista‑partidos');
        if(!cont) return;
        try{
          cont.innerHTML='<div class="flex justify‑center py‑10"><div class="spinner"></div></div>';
          const res=await fetch(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${fecha}&language=es&hydrate=linescore,probablePitchers,status,linescore.offense`);
          if(!res.ok) throw new Error('API MLB no responde');
          const datos=await res.json();
          const juegos=datos.dates?.[0]?.games||[];
          if(!juegos.length){cont.innerHTML='<p class="text‑center py‑8">📭 Sin partidos esta fecha</p>';return;}
          let html='';
          for(const p of juegos){
            const a=p.teams.away,h=p.teams.home;
            const estado=p.status;
            const vivo=estado.abstractGameState==='Live',final=estado.abstractGameState==='Final';
            const horaLima=new Date(new Date(p.gameDate).getTime()+ZONA_UTC*3600000).toLocaleTimeString('es‑PE',{hour:'2‑digit',minute:'2‑digit'});
            const ls=p.linescore||{};
            const v=leerEntradas(ls,true),l=leerEntradas(ls,false);
            const lanzA=p.probablePitchers?.away?.fullName||(final?'Finalizado':'Por confirmar');
            const lanzH=p.probablePitchers?.home?.fullName||(final?'Finalizado':'Por confirmar');
            const marcador=final||vivo?`${v.C}‑${l.C}`:horaLima;
            html+=`
            <div class="bg‑white dark:bg‑gray‑800 rounded‑xl border border‑grisClaro dark:border‑gray‑700 p‑4 shadow‑sm card‑hover relative">
              ${vivo?`<span class="absolute top‑2 right‑3 bg‑rojoVivo text‑white text‑[0.7rem] px‑2 py‑0.5 rounded‑full flex items‑center gap‑1"><span class="w‑1.5 h‑1.5 bg‑white rounded‑full parpadeo"></span>EN VIVO</span>`:''}
              ${final?`<span class="absolute top‑2 right‑3 bg‑gris text‑white text‑[0.7rem] px‑2 py‑0.5 rounded‑full">FINAL</span>`:''}
              <div class="flex items‑center justify‑between mb‑4">
                <div class="flex items‑center gap‑2">
                  <img src="https://www.mlbstatic.com/team‑logos/${a.team.id}.svg" class="w‑9 h‑9" alt="${a.team.name}" loading="lazy">
                  <div><div class="font‑semibold text‑sm">${a.team.name}</div><div class="text‑xs">${a.leagueRecord.wins}‑${a.leagueRecord.losses}</div></div>
                </div>
                <div class="text‑2xl font‑bold min‑w‑[4rem] text‑center">${marcador}</div>
                <div class="flex items‑center gap‑2 text‑right flex‑row‑reverse">
                  <img src="https://www.mlbstatic.com/team‑logos/${h.team.id}.svg" class="w‑9 h‑9" alt="${h.team.name}" loading="lazy">
                  <div><div class="font‑semibold text‑sm">${h.team.name}</div><div class="text‑xs">${h.leagueRecord.wins}‑${h.leagueRecord.losses}</div></div>
                </div>
              </div>
              <div class="overflow‑x‑auto">
                <div class="grid grid‑entradas gap‑x‑1 text‑xs text‑center font‑medium text‑gris/80">
                  ${[1,2,3,4,5,6,7,8,9].map(n=>`<span>${n}</span>`).join('')}
                  <span class="border‑l border‑grisClaro">C</span><span>H</span><span>E</span>
                </div>
                <div class="grid grid‑entradas gap‑x‑1 text‑xs text‑center py‑1 border‑t border‑grisClaro mt‑1">
                  ${v.fila.map(x=>`<span>${x}</span>`).join('')}
                  <span class="font‑semibold border‑l border‑grisClaro">${v.C}</span><span class="font‑semibold">${v.H}</span><span class="font‑semibold">${v.E}</span>
                </div>
                <div class="grid grid‑entradas gap‑x‑1 text‑xs text‑center py‑1">
                  ${l.fila.map(x=>`<span>${x}</span>`).join('')}
                  <span class="font‑semibold border‑l border‑grisClaro">${l.C}</span><span class="font‑semibold">${l.H}</span><span class="font‑semibold">${l.E}</span>
                </div>
              </div>
              ${vivo?`<div class="mt‑3 flex justify‑around text‑xs bg‑gray‑50 dark:bg‑gray‑700 rounded py‑3 items‑center">${dibujarBases(ls.offense)}<span>B ${ls.balls||0} • S ${ls.strikes||0} • O ${ls.outs||0}</span></div>`:''}
              <div class="mt‑4 grid grid‑cols‑2 gap‑2 text‑xs">
                <div><div class="text‑gris dark:text‑gray‑400">Lanzando</div><div class="font‑medium truncate">${lanzA}</div></div>
                <div class="text‑right"><div class="text‑gris dark:text‑gray‑400">Al bate</div><div class="font‑medium truncate">${lanzH}</div></div>
              </div>
            </div>`;
          }
          cont.innerHTML=html;
        }catch(e){cont.innerHTML=`<p class="text‑center py‑6 text‑red‑500">⚠️ ${e.message}</p>`;}
      }

      // --- NBA ---
      async function cargarNBA(){
        const cont=document.getElementById('lista‑nba');
        if(!cont) return;
        try{
          cont.innerHTML='<div class="flex justify‑center py‑10"><div class="spinner"></div></div>';
          const res=await fetch(`https://www.balldontlie.io/api/v1/games?dates[]=${iso(fechaLima())}`);
          if(!res.ok) throw new Error('Sin datos');
          const d=await res.json();
          if(!d.data.length){cont.innerHTML='<p class="text‑center py‑8">🏀 Temporada finalizada o sin partidos hoy</p>';return;}
          let html='';
          for(const g of d.data){
            html+=`
            <div class="bg‑white dark:bg‑gray‑800 rounded‑xl p‑4 shadow‑sm border border‑grisClaro dark:border‑gray‑700 card‑hover">
              <div class="flex justify‑between items‑center">
                <div class="text‑center flex‑1">
                  <div class="font‑semibold text‑sm">${g.home_team.full_name}</div>
                  <div class="text‑2xl font‑bold">${g.home_team_score}</div>
                </div>
                <div class="px‑4 text‑xs text‑gray‑500 dark:text‑gray‑400">VS</div>
                <div class="text‑center flex‑1">
                  <div class="font‑semibold text‑sm">${g.visitor_team.full_name}</div>
                  <div class="text‑2xl font‑bold">${g.visitor_team_score}</div>
                </div>
              </div>
              <div class="text‑center text‑xs mt‑2 text‑gray‑500 dark:text‑gray‑400">${g.status}</div>
            </div>`;
          }
          cont.innerHTML=html;
        }catch(e){cont.innerHTML='<p class="text‑center py‑6 text‑red‑500">⚠️ Error al cargar NBA</p>';}
      }

      // --- Inicio y actualización ---
      mostrarFechas();
      cargarMLB(fechaParaAPI(fechaActual));
      cargarNBA();
      setInterval(()=>{if(iso(fechaActual)===iso(fechaLima())) cargarMLB(fechaParaAPI(fechaActual));},20000);
    });
  </script>
</body>
</html>
