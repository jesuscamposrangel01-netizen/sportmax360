<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPORTMAX 360 | MLB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fondo: '#050a14',
                        tarjeta: '#0f1724',
                        azul: '#00d4ff',
                        gris: '#88a2b9',
                        vivo: '#ff4456',
                    },
                    fontFamily: {
                        sans: ['Segoe UI', 'Roboto', 'Arial', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .scroll-hide::-webkit-scrollbar { display: none; }
            .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }
            .texto-gradiente { background-clip: text; -webkit-background-clip: text; color: transparent; background-image: linear-gradient(90deg, #00D4FF, #7B2FFC); }
            .pulse-vivo { animation: parpadeo 1.2s infinite ease-in-out; }
            @keyframes parpadeo { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
        }
    </style>
</head>
<body class="bg-fondo text-gray-100 font-sans min-h-screen">

<!-- HEADER -->
<header class="bg-[#0b1422] py-6 px-4 border-b border-azul/40">
    <h1 class="text-[clamp(1.8rem,4vw,2.4rem)] font-bold texto-gradiente text-center">SPORTMAX 360</h1>
    <p class="text-gris text-center mt-1 text-sm">Deporte en tiempo real</p>
</header>

<!-- NAVEGACIÓN -->
<nav class="bg-tarjeta/80 sticky top-0 z-50 border-b border-gray-700/50 py-3 px-4">
    <div class="max-w-xl mx-auto flex justify-center gap-6 text-sm">
        <a href="#" class="text-azul font-medium">📊 Datos API</a>
        <a href="#" class="text-gris hover:text-azul">🌍 Mundial 2026</a>
        <a href="#" class="text-gris hover:text-azul">💬 Foro y Comunidad</a>
        <a href="#" class="text-gris hover:text-azul">📍 Sedes</a>
    </div>
</nav>

<!-- CONTENIDO -->
<main class="max-w-xl mx-auto px-4 py-6">
    <div class="flex items-center justify-center gap-2 text-gris text-sm mb-8">
        <span class="w-2 h-2 rounded-full bg-green-400 shadow-[0_0_6px_#4ade80]"></span>
        <span>Sincronizado con API MLB</span>
    </div>

    <section>
        <h2 class="text-[clamp(1.7rem,3vw,2.2rem)] font-bold border-l-[5px] border-azul pl-3 mb-6">📊 MLB ⚾ — Resultados & Vivo</h2>

        <!-- Pestañas -->
        <div class="flex gap-4 mb-8">
            <button class="tab-btn activo px-6 py-3 rounded-xl bg-[#141e2d] border border-[#1b293b] text-azul font-semibold shadow-lg" data-tab="mlb">⚾ MLB</button>
            <button class="tab-btn px-6 py-3 rounded-xl bg-transparent border border-[#1b293b] text-gris hover:border-azul/40 transition" data-tab="futbol">⚽ Fútbol</button>
        </div>

        <!-- MLB -->
        <div id="sect-mlb">
            <div class="mb-6">
                <h3 class="text-2xl text-azul font-semibold flex items-center gap-2 mb-4">📅 Calendario por fecha</h3>
                <div class="flex items-center justify-center gap-3 bg-[#0b1422] rounded-xl py-3 px-2">
                    <button onclick="cambiarFecha(-1)" class="text-xl px-2 text-gray-300 hover:text-azul">‹</button>
                    <div id="fechas-lista" class="flex gap-4"></div>
                    <button onclick="cambiarFecha(1)" class="text-xl px-2 text-gray-300 hover:text-azul">›</button>
                </div>
            </div>

            <!-- Lista partidos -->
            <div id="lista-partidos-mlb" class="space-y-5">
                <p class="text-center text-gris py-10">Cargando encuentros…</p>
            </div>
        </div>

        <!-- Fútbol -->
        <div id="sect-futbol" class="hidden">
            <div class="bg-tarjeta rounded-xl border border-[#1b293b] p-5">
                <h3 class="text-xl text-azul mb-4">⚽ Competiciones</h3>
                <select id="ligaSelect" class="w-full bg-[#0b1422] border border-[#1b293b] rounded-lg px-3 py-2 text-gray-200 mb-6">
                    <option value="4328">🏴 Premier League</option>
                    <option value="4335">🇪🇸 La Liga</option>
                    <option value="4391">🇮🇹 Serie A</option>
                    <option value="4346">🇩🇪 Bundesliga</option>
                    <option value="4423">🌎 Copa América</option>
                </select>
                <div id="lista-partidos-fut" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <p class="col-span-full text-center text-gris py-8">Cargando…</p>
                </div>
            </div>
        </div>
    </section>
</main>

<script>
let fechaActual = new Date();
const zonaPeru = -5;
const ANIO_MLB = 2025;
const API_KEY_TSD = "3";
const TEMP_FUT = "2024-2025";

// Cambio pestañas
document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('activo','bg-[#141e2d]','text-azul'));
    btn.classList.add('activo','bg-[#141e2d]','text-azul');
    document.getElementById('sect-mlb').classList.toggle('hidden', btn.dataset.tab !== 'mlb');
    document.getElementById('sect-futbol').classList.toggle('hidden', btn.dataset.tab !== 'futbol');
}));

function fechaISO(d){ return d.toISOString().split('T')[0]; }
function formatearHoraET(fechaISO){
    if(!fechaISO) return "";
    const f=new Date(fechaISO);
    const horaET = f.toLocaleTimeString("en-US",{hour:'numeric',minute:'2-digit',hour12:true}) + " ET";
    f.setHours(f.getHours() + zonaPeru);
    const horaPE = f.toLocaleTimeString("es-PE",{hour:'numeric',minute:'2-digit',hour12:true});
    return `${horaPE} / ${horaET}`;
}
function nombreDiaCorto(d){return ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'][d.getDay()];}
function numMesCorto(d){return d.getDate() + " " + ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][d.getMonth()];}

function cambiarFecha(paso){fechaActual.setDate(fechaActual.getDate()+paso);renderFechas();cargarPartidos(fechaISO(fechaActual));}
function irFecha(iso){fechaActual=new Date(iso+"T00:00:00");renderFechas();cargarPartidos(iso);}
function renderFechas(){
    const cont=document.getElementById("fechas-lista");let html="";
    for(let i=-1;i<=1;i++){let f=new Date(fechaActual);f.setDate(f.getDate()+i);const activo=fechaISO(f)===fechaISO(fechaActual);
    html+=`<div class="fecha-item cursor-pointer text-center px-4 py-2 rounded-lg transition ${activo?'bg-azul text-black font-semibold':'text-gray-300 hover:bg-[#141e2d]'}" onclick="irFecha('${fechaISO(f)}')">
    <div class="text-sm">${['Jue','Vie','Sáb'][i+1] || nombreDiaCorto(f)}</div><div class="text-lg font-medium">${numMesCorto(f)}</div></div>`;}
    cont.innerHTML=html;
}

async function cargarPartidos(fecha){
    const URL=`https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${fecha}&language=es&hydrate=linescore,probablePitchers,venue`;
    try{
        const res=await fetch(URL);if(!res.ok) throw 1;
        const datos=await res.json();const juegos=datos.dates?.[0]?.games||[];
        const caja=document.getElementById("lista-partidos-mlb");
        if(!juegos.length){caja.innerHTML=`<p class="text-gris text-center py-12">Sin partidos programados</p>`;return;}

        caja.innerHTML=juegos.map(p=>{
            const away=p.teams?.away||{};const home=p.teams?.home||{};
            const lanzA=p.probablePitchers?.away||{};const lanzH=p.probablePitchers?.home||{};
            const idA=away.team?.id||"";const idH=home.team?.id||"";
            const nomA=away.team?.name||"Visitante";const nomH=home.team?.name||"Local";
            const regA=away.leagueRecord?`${away.leagueRecord.wins} - ${away.leagueRecord.losses}`:"";
            const regH=home.leagueRecord?`${home.leagueRecord.wins} - ${home.leagueRecord.losses}`:"";
            const estado=p.status||{};
            const vivo=estado.abstractGameState==="Live";
            const marcA=p.linescore?.teams?.away?.runs??0;
            const marcH=p.linescore?.teams?.home?.runs??0;
            const hitsA=p.linescore?.teams?.away?.hits??0;
            const hitsH=p.linescore?.teams?.home?.hits??0;
            const errA=p.linescore?.teams?.away?.errors??0;
            const errH=p.linescore?.teams?.home?.errors??0;
            const estadio=p.venue?.name||"";

            return `
            <div class="bg-tarjeta rounded-xl border border-[#1b293b] p-5 relative">
                ${vivo?`<span class="absolute top-3 right-4 bg-vivo/90 text-white text-[0.7rem] font-semibold px-2 py-1 rounded-full flex items-center gap-1"><span class="w-1.5 h-1.5 bg-white rounded-full pulse-vivo"></span>EN VIVO</span>`:""}

                <div class="grid grid-cols-[1fr_auto_1fr] gap-4 items-center">
                    <div class="flex items-center gap-3">
                        <img src="https://www.mlbstatic.com/team-logos/${idA}.svg" alt="${nomA}" class="w-14 h-14 bg-white rounded p-1 object-contain">
                        <div>
                            <h4 class="text-lg font-medium">${nomA}</h4>
                            <p class="text-sm text-gris">${regA}</p>
                        </div>
                    </div>
                    <div class="text-center">
                        <div class="text-[clamp(2rem,5vw,2.8rem)] font-bold">${marcA} : ${marcH}</div>
                        <p class="text-sm text-gris">${formatearHoraET(p.gameDate)}</p>
                    </div>
                    <div class="flex items-center gap-3 justify-end flex-row-reverse text-right">
                        <img src="https://www.mlbstatic.com/team-logos/${idH}.svg" alt="${nomH}" class="w-14 h-14 bg-white rounded p-1 object-contain">
                        <div>
                            <h4 class="text-lg font-medium">${nomH}</h4>
                            <p class="text-sm text-gris">${regH}</p>
                        </div>
                    </div>
                </div>

                <div class="mt-4 text-sm text-gris flex justify-around">
                    <span>Visita: C ${marcA} • H ${hitsA} • E ${errA}</span>
                    <span>Local: C ${marcH} • H ${hitsH} • E ${errH}</span>
                </div>

                <div class="mt-3 flex justify-between text-xs text-gris">
                    <span>🧢 ${lanzA.fullName||"Sin lanzador definido"}</span>
                    <span>🧢 ${lanzH.fullName||"Sin lanzador definido"}</span>
                </div>

                <p class="text-center text-xs text-gris mt-3">📍 ${estadio}</p>

                <div class="mt-4 flex justify-around text-sm font-medium">
                    <a href="https://www.mlb.com/es/gameday/${p.gamePk}" target="_blank" class="text-azul hover:underline">Gameday</a>
                    <a href="#" class="text-azul hover:underline">Boletos</a>
                    <a href="#" class="text-azul hover:underline">Crónica</a>
                </div>
            </div>`;
        }).join("");
    }catch(e){document.getElementById("lista-partidos-mlb").innerHTML=`<p class="text-center text-red-400 py-10">Error al cargar datos</p>`;}
}

// Inicio
renderFechas();cargarPartidos(fechaISO(fechaActual));
setInterval(()=>cargarPartidos(fechaISO(fechaActual)),45000);
</script>
</body>
</html>
