<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba API | Sportmax360</title>
    <style>
        :root{--verde:#2F855A; --fondo:#f8fafc; --texto:#2d3748; --sombra:0 4px 12px rgba(0,0,0,.07);}
        body{background:var(--fondo);color:var(--texto);font-family:Segoe UI,Roboto,Arial,sans-serif;max-width:900px;margin:2rem auto;padding:0 1rem;}
        .tarjeta{background:#fff;padding:1.5rem;border-radius:10px;box-shadow:var(--sombra);margin-bottom:1.5rem;}
        .aviso{color:#dc2626;font-weight:500;}
        .ok{color:#166534;}
        button{padding:.6rem 1.2rem;border:none;border-radius:6px;background:var(--verde);color:#fff;font-weight:bold;cursor:pointer;}
    </style>
</head>
<body>
    <h1>⚽ Prueba: worldcup26.ir/get/games</h1>

    <div class="tarjeta">
        <button onclick="probarAPI()">Ejecutar prueba</button>
        <div id="resultado" style="margin-top:1rem;"></div>
    </div>

    <div class="tarjeta">
        <h3>🔄 Fuente alternativa estable (si falla)</h3>
        <p>Usamos <strong>The‑SportsDB</strong> como antes, funciona siempre en GitHub Pages.</p>
        <div id="alt" class="ok"></div>
    </div>

<script>
const URL_PRUEBA = "https://worldcup26.ir/get/games";

async function probarAPI(){
    const cont = document.getElementById("resultado");
    try{
        const res = await fetch(URL_PRUEBA, {
            headers:{"Accept":"application/json"},
            signal:AbortSignal.timeout(8000)
        });
        if(!res.ok) throw new Error(`HTTP ${res.status}`);
        const texto = await res.text();
        try{
            const datos = JSON.parse(texto);
            cont.innerHTML = `<p class='ok'>✅ Respuesta recibida<br><pre style='font-size:.9rem'>${JSON.stringify(datos,null,2).slice(0,500)}…</pre></p>`;
        }catch{
            cont.innerHTML = `<p class='aviso'>❌ No es JSON válido<br>Respuesta: ${texto.slice(0,300)}</p>`;
        }
    }catch(e){
        cont.innerHTML = `<p class='aviso'>❌ Error: ${e.message}<br>Esta URL suele tener bloqueos CORS o no es pública.</p>`;
    }
}

// Datos seguros de respaldo
async function cargarRespaldo(){
    const cont = document.getElementById("alt");
    const API = "3";
    const res = await fetch(`https://www.thesportsdb.com/api/v1/json/${API}/eventspastleague.php?id=4423`);
    const datos = await res.json();
    const partidos = datos.events?.slice(0,3)||[];
    cont.innerHTML = partidos.map(p=>`
        <p>${p.strHomeTeam} ${p.intHomeScore??"-"} : ${p.intAwayScore??"-"} ${p.strAwayTeam}</p>`).join("");
}

cargarRespaldo();
</script>
</body>
</html>
