<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#0b1e2e;
  --secondary:#1a4971;
  --accent:#e11d48;
  --blue:#1a56db;
  --green:#22c55e;
  --gold:#fbbf24;
  --bg:#f0f4ff;
  --card:#ffffff;
  --text:#1e293b;
  --muted:#64748b;
  --border:#e2e8f0;
  --card-shadow:0 4px 20px rgba(0,0,0,0.08);
  --shadow-hover:0 12px 40px rgba(0,0,0,0.15);
}
.dark{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#e2e8f0;
  --muted:#94a3b8;
  --border:#334155;
  --card-shadow:0 4px 20px rgba(0,0,0,0.4);
  --shadow-hover:0 12px 40px rgba(0,0,0,0.6);
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;}
a{color:var(--blue);text-decoration:none}
button{cursor:pointer;border:none;background:none;font-family:inherit}
header{background:var(--primary);color:#fff;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3);}
.header-inner{max-width:1280px;margin:0 auto;padding:12px 16px}
.header-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.logo{display:flex;align-items:center;gap:8px;cursor:pointer}
.logo h1{font-size:1.25rem;font-weight:900;letter-spacing:-.5px}
.logo-badge{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);padding:2px 12px;border-radius:999px;font-size:.7rem;font-weight:600}
.header-right{display:flex;align-items:center;gap:12px}
.live-badge{display:flex;align-items:center;gap:6px;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);padding:4px 12px;border-radius:999px;font-size:.7rem;font-weight:700;color:#4ade80;text-transform:uppercase;letter-spacing:.5px;}
.live-dot{width:7px;height:7px;background:#22c55e;border-radius:50%;animation:pulse 1.2s infinite}
.theme-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;padding:6px 10px;border-radius:8px;font-size:1rem;transition:background .2s;}
.theme-btn:hover{background:rgba(255,255,255,.18)}
.sport-tabs{display:flex;gap:8px;margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,.1)}
.sport-btn{padding:5px 16px;border-radius:999px;font-size:.8rem;font-weight:600;color:rgba(255,255,255,.6);background:rgba(255,255,255,.06);border:1px solid transparent;transition:all .2s;}
.sport-btn:hover{background:rgba(255,255,255,.14);color:#fff}
.sport-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 0 16px rgba(26,86,219,.4)}
nav.main-nav{display:flex;gap:4px;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.08);overflow-x:auto;scrollbar-width:none;}
nav.main-nav::-webkit-scrollbar{display:none}
.nav-link{padding:4px 12px;border-radius:6px;font-size:.8rem;font-weight:500;color:rgba(255,255,255,.55);white-space:nowrap;transition:all .2s;}
.nav-link:hover{color:#fff;background:rgba(255,255,255,.08)}
.nav-link.active{color:#fff;border-bottom:2px solid var(--accent);padding-bottom:2px}
main{max-width:1280px;margin:0 auto;padding:24px 16px}
.page{display:none}
.page.active{display:block;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

.banner{
  background:linear-gradient(135deg,#0b1e2e 0%,#1a4971 100%);
  color:#fff;padding:32px 36px;border-radius:20px;
  box-shadow:0 8px 32px rgba(11,30,46,.5);margin-bottom:24px;
  position:relative;overflow:hidden;
}
.banner::after{
  content:'⚽';position:absolute;right:-20px;bottom:-30px;
  font-size:140px;opacity:.08;transform:rotate(-10deg);
}
.banner h2{font-size:1.8rem;font-weight:900;line-height:1.2}
.banner p{opacity:.85;margin-top:6px;font-size:.95rem;max-width:600px}

.ticker{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:14px 20px;display:flex;align-items:center;gap:14px;
  box-shadow:var(--card-shadow);margin-bottom:24px;overflow:hidden;
}
.ticker-label{
  background:var(--accent);color:#fff;font-size:.65rem;font-weight:700;
  padding:4px 12px;border-radius:6px;white-space:nowrap;letter-spacing:.5px;
  text-transform:uppercase;flex-shrink:0;
}
.ticker-text{font-size:.9rem;font-weight:500;flex:1;animation:fadeIn .4s ease}

.carousel-container{
  position:relative;margin-bottom:28px;border-radius:16px;
  overflow:hidden;box-shadow:var(--card-shadow);
}
.carousel-slides{
  display:flex;transition:transform .6s cubic-bezier(.4,0,.2,1);
}
.carousel-slide{
  min-width:100%;background:var(--card);padding:28px 32px;
  border-left:4px solid var(--blue);display:flex;
  flex-direction:column;gap:8px;
}
.carousel-slide .carousel-tag{
  font-size:.7rem;font-weight:700;color:var(--blue);
  text-transform:uppercase;letter-spacing:.5px;
}
.carousel-slide h3{
  font-size:1.3rem;font-weight:700;line-height:1.3;
  color:var(--text);
}
.carousel-slide p{
  color:var(--muted);font-size:.9rem;line-height:1.6;
}
.carousel-slide .carousel-link{
  color:var(--blue);font-weight:600;font-size:.85rem;
  margin-top:4px;display:inline-flex;align-items:center;gap:4px;
}
.carousel-controls{
  position:absolute;top:50%;width:100%;transform:translateY(-50%);
  display:flex;justify-content:space-between;padding:0 12px;
  pointer-events:none;
}
.carousel-controls button{
  pointer-events:auto;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);
  color:#fff;border-radius:50%;width:40px;height:40px;
  font-size:1.2rem;display:flex;align-items:center;justify-content:center;
  transition:background .2s;border:1px solid rgba(255,255,255,.2);
}
.carousel-controls button:hover{background:rgba(0,0,0,.7)}
.carousel-dots{
  display:flex;justify-content:center;gap:8px;padding:12px 0 4px;
}
.carousel-dot{
  width:10px;height:10px;border-radius:50%;background:var(--border);
  border:2px solid transparent;transition:all .3s;cursor:pointer;
}
.carousel-dot.active{background:var(--blue);border-color:var(--blue);}

.stats-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:16px;margin-bottom:28px;
}
.stat-card-large{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:20px;text-align:center;
  box-shadow:var(--card-shadow);transition:transform .2s,box-shadow .2s;
}
.stat-card-large:hover{transform:translateY(-4px);box-shadow:var(--shadow-hover)}
.stat-card-large .stat-number{
  font-size:2rem;font-weight:900;color:var(--blue);line-height:1.2;
}
.stat-card-large .stat-label{
  font-size:.75rem;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.3px;margin-top:4px;
}

.video-highlight{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:20px;margin-bottom:28px;
  box-shadow:var(--card-shadow);
}
.video-highlight .video-title{
  font-size:1.1rem;font-weight:700;margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
}
.video-highlight .video-wrapper{
  position:relative;padding-bottom:56.25%;height:0;overflow:hidden;
  border-radius:12px;background:#000;
}
.video-highlight .video-wrapper iframe{
  position:absolute;top:0;left:0;width:100%;height:100%;border:none;
}
.video-fallback{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#1a1a2e;color:#fff;padding:30px 20px;border-radius:12px;
  min-height:200px;text-align:center;gap:12px;
}
.video-fallback .icon{font-size:3rem;opacity:.6}
.video-fallback h4{font-size:1rem;font-weight:600}
.video-fallback p{font-size:.85rem;opacity:.7;max-width:400px}
.video-fallback .btn-youtube{
  background:#ff0000;color:#fff;padding:8px 24px;border-radius:999px;
  font-weight:600;font-size:.85rem;transition:background .2s;
  display:inline-flex;align-items:center;gap:6px;border:none;cursor:pointer;
  text-decoration:none;
}
.video-fallback .btn-youtube:hover{background:#cc0000}

.standings-mini{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:16px;margin-bottom:28px;
}
.standings-mini-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:16px;box-shadow:var(--card-shadow);
}
.standings-mini-card h4{
  font-size:.75rem;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.3px;margin-bottom:10px;
}
.standings-mini-item{
  display:flex;justify-content:space-between;padding:4px 0;
  font-size:.85rem;border-bottom:1px solid var(--border);
}
.standings-mini-item:last-child{border:none}
.standings-mini-item .pos{font-weight:700;color:var(--muted);width:24px}
.standings-mini-item .team{font-weight:600;flex:1}
.standings-mini-item .pts{font-weight:700;color:var(--blue)}

.match-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:16px 20px;
  box-shadow:var(--card-shadow);
  transition:transform .25s ease,box-shadow .25s ease,border-color .25s;
}
.match-card:hover{
  transform:translateY(-6px);box-shadow:var(--shadow-hover);
  border-color:var(--blue);
}
.match-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.status-badge{font-size:.6rem;font-weight:700;padding:4px 12px;border-radius:999px;text-transform:uppercase;letter-spacing:.3px}
.badge-vivo{background:#dc2626;color:#fff;animation:pulse 1.2s infinite}
.badge-final{background:#64748b;color:#fff}
.badge-programado{background:#dbeafe;color:#1e40af}
.dark .badge-programado{background:#1e3a5f;color:#93c5fd}
.match-date{font-size:.7rem;color:var(--muted);font-weight:500}
.team-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0}
.team-info{display:flex;align-items:center;gap:10px}
.team-flag{font-size:1.4rem;line-height:1}
.team-name{font-weight:600;font-size:.9rem}
.team-score{font-weight:800;font-size:1.2rem;color:var(--text)}

.grid-main{display:grid;grid-template-columns:1fr 320px;gap:24px}
.grid-2{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.grid-teams{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.grid-standings{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px}
@media(max-width:768px){.grid-main{grid-template-columns:1fr}}
.section-title{font-size:1.3rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.section-title::before{content:'';display:block;width:4px;height:28px;background:var(--accent);border-radius:4px}
.section-title .sub{font-size:.75rem;font-weight:500;color:var(--muted);margin-left:auto}

.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;box-shadow:var(--card-shadow);}
.stat-card h4{font-size:.7rem;font-weight:700;margin-bottom:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.stat-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:.85rem}
.stat-item:last-child{border:none}
.stat-val{font-weight:700;color:var(--blue)}

.standings-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--card-shadow);}
.standings-card-header{background:rgba(26,86,219,.07);padding:12px 16px;border-bottom:2px solid var(--blue);font-weight:700;font-size:.95rem;}
.standings-table{width:100%;border-collapse:collapse;font-size:.78rem}
.standings-table th{padding:7px 10px;text-align:center;font-weight:700;text-transform:uppercase;font-size:.62rem;letter-spacing:.3px;color:var(--muted);background:rgba(0,0,0,.02);}
.dark .standings-table th{background:rgba(255,255,255,.03)}
.standings-table td{padding:7px 10px;border-bottom:1px solid var(--border);text-align:center}
.standings-table tr:last-child td{border:none}
.standings-table tr:hover td{background:rgba(26,86,219,.03)}
.standings-table td.pts{font-weight:800;color:var(--blue)}
.standings-table tr.clasificado td{border-left:4px solid var(--green)}

.news-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;box-shadow:var(--card-shadow);transition:transform .2s,box-shadow .2s;cursor:pointer;}
.news-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover)}
.news-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.news-sport-tag{font-size:.62rem;font-weight:700;padding:3px 10px;border-radius:4px;background:rgba(26,86,219,.1);color:var(--blue);text-transform:uppercase}
.news-date{font-size:.72rem;color:var(--muted)}
.news-title{font-size:1.05rem;font-weight:700;margin-bottom:8px;line-height:1.35}
.news-summary{font-size:.85rem;color:var(--muted);line-height:1.5}
.news-more{color:var(--blue);font-size:.8rem;font-weight:600;margin-top:12px}

.video-card{padding:20px !important;border-left:4px solid var(--blue)}
.video-wrapper{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:10px;margin:12px 0;background:#000}
.video-wrapper iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
.news-card.video-card .news-title{font-size:1.2rem}

.team-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 12px;box-shadow:var(--card-shadow);display:flex;flex-direction:column;align-items:center;gap:8px;aspect-ratio:1;justify-content:center;transition:all .2s;cursor:pointer;}
.team-card:hover{border-color:var(--blue);transform:translateY(-3px)}
.team-icon{font-size:1.8rem}
.team-card-name{font-size:.78rem;font-weight:600;text-align:center}
.static-page{max-width:720px}
.static-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;box-shadow:var(--card-shadow);}
.static-box p{margin-bottom:14px;line-height:1.7;color:var(--text)}
.static-box h3{font-size:1rem;font-weight:700;margin:20px 0 8px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:.85rem;font-weight:600;margin-bottom:5px}
.form-input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-family:inherit;font-size:.9rem;transition:border-color .2s;outline:none;}
.form-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,.15)}
.form-btn{width:100%;background:var(--blue);color:#fff;font-weight:700;padding:12px;border-radius:8px;font-size:.95rem;transition:background .2s;font-family:inherit;border:none;cursor:pointer;}
.form-btn:hover{background:#2563eb}
.success-msg{background:#dcfce7;color:#166534;padding:12px 16px;border-radius:8px;font-weight:600;font-size:.9rem;margin-bottom:16px;display:none;}
.dark .success-msg{background:#14532d;color:#bbf7d0}
#cookieBanner{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,.9);backdrop-filter:blur(8px);color:#fff;padding:14px 20px;z-index:999;display:none;justify-content:center;align-items:center;gap:16px;flex-wrap:wrap;font-size:.85rem;}
#cookieBanner.show{display:flex}
#cookieBanner a{color:#93c5fd}
.cookie-btn{background:var(--blue);color:#fff;padding:7px 22px;border-radius:999px;font-weight:700;font-size:.85rem;transition:background .2s;font-family:inherit;border:none;cursor:pointer;}
.cookie-btn:hover{background:#2563eb}
footer{background:var(--primary);color:rgba(255,255,255,.55);text-align:center;padding:24px 16px;margin-top:40px;font-size:.8rem;border-top:1px solid rgba(255,255,255,.08);}
.footer-links{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-bottom:10px}
.footer-links span{cursor:pointer;transition:color .2s}
.footer-links span:hover{color:#fff}
.empty{text-align:center;padding:48px 24px;background:var(--card);border:2px dashed var(--border);border-radius:16px;color:var(--muted);}
.empty-icon{font-size:2.5rem;opacity:.4;margin-bottom:12px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:40px auto;}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:640px){.banner h2{font-size:1.3rem}.grid-standings{grid-template-columns:1fr}.grid-teams{grid-template-columns:repeat(3,1fr)}.grid-main{grid-template-columns:1fr}.stats-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<!-- COOKIE BANNER -->
<div id="cookieBanner">
  <span>🍪 Usamos cookies para mejorar tu experiencia. Al continuar, aceptas nuestra <a href="#" onclick="navegar('privacidad');return false">política de privacidad</a>.</span>
  <button class="cookie-btn" onclick="aceptarCookies()">Aceptar</button>
</div>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <div class="header-top">
      <div class="logo" onclick="navegar('inicio')">
        <span id="headerIcon" style="font-size:1.5rem">⚽</span>
        <h1>SportVivo360</h1>
        <span class="logo-badge" id="headerSportLabel">Mundial 2026</span>
      </div>
      <div class="header-right">
        <div class="live-badge"><div class="live-dot"></div>EN VIVO</div>
        <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Cambiar tema">🌙</button>
      </div>
    </div>
    <div class="sport-tabs">
      <button class="sport-btn active" data-sport="futbol" onclick="cambiarDeporte(this)">⚽ Mundial 2026</button>
      <button class="sport-btn" data-sport="mlb" onclick="cambiarDeporte(this)">⚾ MLB</button>
      <button class="sport-btn" data-sport="nba" onclick="cambiarDeporte(this)">🏀 NBA</button>
    </div>
    <nav class="main-nav">
      <button class="nav-link active" data-page="inicio" onclick="navegar('inicio')">Inicio</button>
      <button class="nav-link" data-page="envivo" onclick="navegar('envivo')">🔴 En vivo</button>
      <button class="nav-link" data-page="partidos" onclick="navegar('partidos')">Partidos</button>
      <button class="nav-link" data-page="clasificacion" onclick="navegar('clasificacion')">Clasificación</button>
      <button class="nav-link" data-page="equipos" onclick="navegar('equipos')">Equipos</button>
      <button class="nav-link" data-page="noticias" onclick="navegar('noticias')">Noticias</button>
      <button class="nav-link" data-page="analisis" onclick="navegar('analisis')">Análisis</button>
      <button class="nav-link" data-page="contacto" onclick="navegar('contacto')">Contacto</button>
      <button class="nav-link" data-page="acerca" onclick="navegar('acerca')">Acerca</button>
      <button class="nav-link" data-page="privacidad" onclick="navegar('privacidad')">Privacidad</button>
    </nav>
  </div>
</header>

<main>

<!-- ============================================================ -->
<!-- INICIO MEJORADO -->
<!-- ============================================================ -->
<div id="page-inicio" class="page active">
  <!-- Banner -->
  <div class="banner">
    <h2 id="bannerTitulo">Mundial 2026 • Resultados y calendario completo</h2>
    <p id="bannerDesc">Todos los partidos, marcadores y programación del torneo.</p>
  </div>

  <!-- Ticker -->
  <div class="ticker">
    <span class="ticker-label">Última hora</span>
    <span class="ticker-text" id="tickerText">España golea 4-0 a Arabia Saudit
